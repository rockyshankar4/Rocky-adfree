name: Build and Deploy CNCVerse Ad-Free

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Patch files
        run: python patch.py

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Cloudstream Extensions
        run: |
          chmod +x gradlew
          ./gradlew make makePluginsJson

      - name: Prepare Deployment
        run: |
          # Create a directory for build artifacts
          mkdir -p deployment
          # Copy .cs3 files and the generated JSON
          cp **/build/*.cs3 deployment/ || true
          # Check for plugins.json or repo.json and move/rename to CNC.json
          if [ -f "build/plugins.json" ]; then
            cp build/plugins.json deployment/CNC.json
          elif [ -f "plugins.json" ]; then
            cp plugins.json deployment/CNC.json
          else
            echo "CNC.json not found in expected locations."
          fi

      - name: Deploy to Builds Branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: builds
          publish_dir: ./deployment
