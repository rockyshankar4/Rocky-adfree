name: Build and Deploy CNCVerse Ad-Free

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Patch files
        run: python patch.py

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

            - name: Build Cloudstream Extensions
        run: |
          chmod +x gradlew
          ./gradlew make
          ./gradlew makePluginsJson


      # This new step helps us debug where the file went
      - name: Archive build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-results
          path: .
          retention-days: 1

      - name: Deploy to Builds Branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: builds
          # We set this to '.' to publish everything in the root
          publish_dir: .
