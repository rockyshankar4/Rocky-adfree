name: Build and Deploy CNCVerse Ad-Free

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Patch files
        run: python patch.py

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Cloudstream Extensions
        run: |
          chmod +x gradlew
          ./gradlew make makePluginsJson

      - name: Fix JSON paths and Prepare Deployment
        run: |
          # Create a dedicated deployment folder
          mkdir -p deployment
          
          # Copy all generated extension files
          find . -name "*.cs3" -exec cp {} deployment/ \;
          
          # Move and fix the index file
          if [ -f "build/plugins.json" ]; then
            cp build/plugins.json deployment/CNC.json
          elif [ -f "plugins.json" ]; then
            cp plugins.json deployment/CNC.json
          fi
          
          # Fix the JSON URLs to point to your repository
          # This replaces the old repo path with yours so Cloudstream finds your files
          sed -i 's|CNCVerse-Cloud-Stream-Extension|Rocky-adfree|g' deployment/CNC.json
          
          # Update the repositoryUrl field specifically
          sed -i 's|https://github.com/NivinCNC/CNCVerse-Cloud-Stream-Extension|https://github.com/rockyshankar4/Rocky-adfree|g' deployment/CNC.json
          
          # Update the authors
          sed -i 's|NivinCNC|rockyshankar4|g' deployment/CNC.json
          sed -i 's|"authors": \["CNCVerse"\]|"authors": ["rockyshankar4"]|g' deployment/CNC.json

      - name: Deploy to Builds Branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: builds
          publish_dir: ./deployment
